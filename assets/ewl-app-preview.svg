<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">Easy Weight Loss app preview</title>
  <desc id="desc">A clean English mobile nutrition app preview with goals, calories and progress cards.</desc>
  <rect width="1440" height="810" fill="#eef7f2"/>
  <rect x="168" y="72" width="1104" height="666" rx="34" fill="#ffffff"/>
  <text x="238" y="154" fill="#102033" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">Easy Weight Loss</text>
  <text x="238" y="196" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="22">Personal goals, daily food planning and simple progress tracking.</text>

  <g transform="translate(238 252)">
    <rect width="342" height="350" rx="34" fill="#0f766e"/>
    <rect x="34" y="34" width="274" height="282" rx="24" fill="#f8fafc"/>
    <text x="62" y="86" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">Today</text>
    <text x="62" y="124" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">Calories left</text>
    <text x="62" y="184" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="58" font-weight="900">640</text>
    <rect x="62" y="220" width="210" height="16" rx="8" fill="#dbeafe"/>
    <rect x="62" y="220" width="148" height="16" rx="8" fill="#2563eb"/>
    <text x="62" y="276" fill="#334155" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">Protein 82g</text>
  </g>

  <g transform="translate(632 262)">
    <rect width="510" height="92" rx="20" fill="#f8fafc" stroke="#dbe2ea"/>
    <circle cx="52" cy="46" r="22" fill="#dcfce7"/>
    <text x="42" y="54" fill="#0f766e" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">✓</text>
    <text x="92" y="42" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Goal profile</text>
    <text x="92" y="68" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">Weight, pace, calories and macro targets.</text>
  </g>

  <g transform="translate(632 384)">
    <rect width="510" height="92" rx="20" fill="#f8fafc" stroke="#dbe2ea"/>
    <circle cx="52" cy="46" r="22" fill="#e0f2fe"/>
    <text x="40" y="54" fill="#2563eb" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">+</text>
    <text x="92" y="42" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Meal planner</text>
    <text x="92" y="68" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">Fast daily food editing on a phone.</text>
  </g>

  <g transform="translate(632 506)">
    <rect width="510" height="92" rx="20" fill="#f8fafc" stroke="#dbe2ea"/>
    <circle cx="52" cy="46" r="22" fill="#fef3c7"/>
    <text x="42" y="54" fill="#b7791f" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="900">↗</text>
    <text x="92" y="42" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Progress view</text>
    <text x="92" y="68" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="16">Clear history and motivation without spreadsheets.</text>
