<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 810" role="img" aria-labelledby="title desc">
  <title id="title">AI Video Render Worker pipeline</title>
  <desc id="desc">A video automation pipeline showing job queue, VPS worker, voice, subtitles, ffmpeg render and final video output.</desc>
  <rect width="1440" height="810" fill="#101827"/>
  <rect x="88" y="84" width="1264" height="642" rx="32" fill="#f8fafc"/>
  <text x="150" y="160" fill="#172033" font-family="Inter, Arial, sans-serif" font-size="42" font-weight="900">AI Video Render Worker</text>
  <text x="150" y="202" fill="#64748b" font-family="Inter, Arial, sans-serif" font-size="22">A serious pipeline: queue → VPS worker → voice → subtitles → rendered video.</text>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(150 300)">
      <rect width="180" height="130" rx="22" fill="#e0f2fe"/>
      <text x="36" y="58" fill="#075985" font-size="24" font-weight="900">Job queue</text>
      <text x="38" y="92" fill="#475569" font-size="16">new video task</text>
    </g>
    <g transform="translate(390 300)">
      <rect width="190" height="130" rx="22" fill="#ecfdf5"/>
      <text x="38" y="58" fill="#0f766e" font-size="24" font-weight="900">VPS worker</text>
      <text x="38" y="92" fill="#475569" font-size="16">poll + render</text>
    </g>
    <g transform="translate(650 300)">
      <rect width="190" height="130" rx="22" fill="#fef3c7"/>
      <text x="50" y="58" fill="#92400e" font-size="24" font-weight="900">AI voice</text>
      <text x="38" y="92" fill="#475569" font-size="16">speech + timing</text>
    </g>
    <g transform="translate(900 300)">
      <rect width="190" height="130" rx="22" fill="#fee2e2"/>
      <text x="43" y="58" fill="#b91c1c" font-size="24" font-weight="900">ffmpeg</text>
      <text x="38" y="92" fill="#475569" font-size="16">video + subtitles</text>
    </g>
    <g transform="translate(1150 300)">
      <rect width="150" height="130" rx="22" fill="#ede9fe"/>
      <text x="38" y="58" fill="#5b21b6" font-size="24" font-weight="900">Output</text>
      <text x="34" y="92" fill="#475569" font-size="16">ready video</text>
    </g>
  </g>

  <g stroke="#64748b" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M336 365h44"/>
    <path d="M586 365h54"/>
    <path d="M846 365h44"/>
    <path d="M1096 365h44"/>
  </g>

  <g transform="translate(150 518)">
    <rect width="1150" height="82" rx="18" fill="#172033"/>
    <text x="34" y="50" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="900">Competitive advantage: repeatable video production without manual editing every time.</text>
  </g>
</svg>
